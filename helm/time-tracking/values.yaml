cert-manager:
  crds:
    enabled: true

tls:
  type: selfSigned
  acme:
    email: ""
    server: https://acme-v02.api.letsencrypt.org/directory
    ingressClass: nginx
  external:
    name: ""
    kind: ClusterIssuer

mongodb:
  storage:
    size: 2Gi
  version: "7.0.14"
  rootUser: root
  rootPassword: ""
  username: timetracking
  password: ""
  database: time-tracking

mongodb-operator:
  operator:
    watchNamespace: "*"

postgresql:
  storage:
    size: 2Gi
  database: timetracking
  username: timetracking
  password: ""

cloudnative-pg: { }

vault:
  global:
    tlsDisable: false
  server:
    dev:
      enabled: false
    standalone:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          address       = "[::]:8200"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
        }

        storage "raft" {
          path    = "/vault/data"
          node_id = "vault-0"
        }
    volumes:
      - name: vault-tls
        secret:
          secretName: time-tracking-vault-tls
    volumeMounts:
      - name: vault-tls
        mountPath: /vault/userconfig/vault-tls
        readOnly: true
    dataStorage:
      enabled: true
      size: 1Gi
    readinessProbe:
      enabled: true
      path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
    livenessProbe:
      enabled: true
      path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
  injector:
    enabled: true
    leaderElector:
      enabled: false
    certs:
      secretName: time-tracking-vault-agent-injector-tls
      certFilename: tls.crt
      keyFilename: tls.key
    webhook:
      annotations:
        cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ .Release.Name }}-vault-agent-injector-certificate"


vaultK8sAuth:
  mountPath: kubernetes
  vaultAddr: https://time-tracking-vault:8200

auth-service:
  replicaCount: 1
  image:
    repository: time-tracking/auth-service
    registry: ""
    tag: latest
    pullPolicy: IfNotPresent

  config:
    mongoHost: time-tracking-mongodb-svc
    mongoPort: "27017"
    mongoDB: time-tracking
    mongoAuthDB: admin
    mongoSslEnabled: "true"
    vaultUri: https://time-tracking-vault:8200
    vaultKvMount: secret
    vaultSecretPath: auth-service
    authServerIssuer: https://time-tracking-auth-service
    oauth2RedirectUri: http://localhost:3000/callback
    oauth2PostLogoutRedirectUri: http://localhost:3000
    corsAllowedOrigins: http://localhost:3000
    accessTokenTtl: PT1H

  secrets:
    mongoUser: timetracking
    mongoPass: ""
    oauth2ClientId: time-tracking-client

  service:
    type: ClusterIP
    port: 443

  ingress:
    enabled: false
    className: nginx
    host: auth.time-tracking.local

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

project-service:
  replicaCount: 1
  image:
    repository: time-tracking/project-service
    registry: ""
    tag: latest
    pullPolicy: IfNotPresent

  config:
    dbUrl: "jdbc:postgresql://time-tracking-postgresql-rw:5432/timetracking?ssl=true&sslmode=require"
    vaultUri: https://time-tracking-vault:8200
    vaultKvMount: secret
    vaultSecretPath: project-service
    authServerIssuer: https://time-tracking-auth-service
    authServerJwkSetUri: https://time-tracking-auth-service/oauth2/jwks
    corsAllowedOrigins: http://localhost:3000

  secrets:
    dbUser: timetracking
    dbPass: ""

  service:
    type: ClusterIP
    port: 443

  ingress:
    enabled: false
    className: nginx
    host: api.time-tracking.local

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

