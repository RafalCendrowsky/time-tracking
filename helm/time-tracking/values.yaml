cert-manager:
  crds:
    enabled: true

tls:
  type: selfSigned
  acme:
    email: ""
    server: https://acme-v02.api.letsencrypt.org/directory
    ingressClass: nginx
  external:
    name: ""
    kind: ClusterIssuer

mongodb:
  auth:
    rootUser: root
    rootPassword: "changeme"
    usernames:
      - timetracking
    passwords:
      - "changeme"
    databases:
      - time-tracking
  persistence:
    enabled: true
    size: 2Gi
  tls:
    enabled: true
    autoGenerated: false
    existingSecret: time-tracking-mongodb-tls

postgresql:
  auth:
    username: timetracking
    password: "changeme"
    database: timetracking
  primary:
    persistence:
      enabled: true
      size: 2Gi
  tls:
    enabled: true
    autoGenerated: false
    certificatesSecret: time-tracking-postgresql-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
    certCAFilename: ca.crt

vault:
  server:
    dev:
      enabled: false
    standalone:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          address       = "[::]:8200"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
        }

        storage "raft" {
          path    = "/vault/data"
          node_id = "vault-0"
        }
    volumes:
      - name: vault-tls
        secret:
          secretName: time-tracking-vault-tls
    volumeMounts:
      - name: vault-tls
        mountPath: /vault/userconfig/vault-tls
        readOnly: true
    dataStorage:
      enabled: true
      size: 1Gi
  injector:
    enabled: false

auth-service:
  replicaCount: 1
  image:
    repository: time-tracking/auth-service
    tag: latest
    pullPolicy: IfNotPresent

  config:
    mongoHost: time-tracking-mongodb
    mongoPort: "27017"
    mongoDB: time-tracking
    mongoAuthDB: admin
    mongoSslEnabled: "true"
    vaultUri: https://time-tracking-vault:8200
    vaultKvMount: secret
    vaultSecretPath: auth-service
    authServerIssuer: https://time-tracking-auth-service
    oauth2RedirectUri: http://localhost:3000/callback
    oauth2PostLogoutRedirectUri: http://localhost:3000
    corsAllowedOrigins: http://localhost:3000
    accessTokenTtl: PT1H

  secrets:
    mongoUser: timetracking
    mongoPass: "changeme"
    vaultToken: root
    oauth2ClientId: time-tracking-client

  service:
    type: ClusterIP
    port: 443

  ingress:
    enabled: false
    className: nginx
    host: auth.time-tracking.local

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

project-service:
  replicaCount: 1
  image:
    repository: time-tracking/project-service
    tag: latest
    pullPolicy: IfNotPresent

  config:
    dbUrl: "jdbc:postgresql://time-tracking-postgresql:5432/timetracking?ssl=true&sslmode=verify-ca"
    vaultUri: https://time-tracking-vault:8200
    vaultKvMount: secret
    vaultSecretPath: project-service
    authServerIssuer: https://time-tracking-auth-service
    authServerJwkSetUri: https://time-tracking-auth-service/oauth2/jwks
    corsAllowedOrigins: http://localhost:3000

  secrets:
    dbUser: timetracking
    dbPass: "changeme"
    vaultToken: root

  service:
    type: ClusterIP
    port: 443

  ingress:
    enabled: false
    className: nginx
    host: api.time-tracking.local

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

