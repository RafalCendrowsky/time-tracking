apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-project-service
  labels:
    app: {{ .Release.Name }}-project-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-project-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-project-service
    spec:
      initContainers:
        - name: build-truststore
          image: eclipse-temurin:21-jre
          command:
            - sh
            - -c
            - |
              keytool -import -trustcacerts -noprompt \
                -alias cluster-ca \
                -file /etc/ssl/cluster-ca/ca.crt \
                -keystore /etc/ssl/truststore/truststore.jks \
                -storepass changeit
          volumeMounts:
            - name: cluster-ca
              mountPath: /etc/ssl/cluster-ca
              readOnly: true
            - name: truststore
              mountPath: /etc/ssl/truststore
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql-rw 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done
        - name: wait-for-vault
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-vault 8200; do
                echo "Waiting for Vault..."; sleep 3;
              done
        - name: wait-for-auth-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-auth-service 443; do
                echo "Waiting for auth-service..."; sleep 3;
              done
      containers:
        - name: project-service
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djavax.net.ssl.trustStore=/etc/ssl/truststore/truststore.jks
                -Djavax.net.ssl.trustStorePassword=changeit
            - name: SERVER_SSL_CERTIFICATE
              value: /etc/ssl/service-tls/tls.crt
            - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
              value: /etc/ssl/service-tls/tls.key
            - name: SERVER_PORT
              value: {{ .Values.containerPort | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-project-service-config
            - secretRef:
                name: {{ .Release.Name }}-project-service-secret
          volumeMounts:
            - name: truststore
              mountPath: /etc/ssl/truststore
              readOnly: true
            - name: service-tls
              mountPath: /etc/ssl/service-tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.containerPort }}
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.containerPort }}
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: cluster-ca
          secret:
            secretName: {{ .Release.Name }}-ca-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: truststore
          emptyDir: { }
        - name: service-tls
          secret:
            secretName: {{ .Release.Name }}-project-service-tls
