apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-database-read-secrets
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [ "" ]
    resources:
      - configmaps
    resourceNames:
      - {{ .Release.Name }}-mongodb-config
    verbs:
      - get
      - list
      - watch
  - apiGroups: [ "" ]
    resources:
      - pods
    resourceNames:
      - {{ .Release.Name }}-mongodb-0
    verbs:
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-database-read-secrets
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: mongodb-database
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mongodb-database-read-secrets

