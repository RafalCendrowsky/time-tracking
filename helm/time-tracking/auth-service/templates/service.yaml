apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-auth-service
  labels:
    app: {{ .Release.Name }}-auth-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-auth-service
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: https
