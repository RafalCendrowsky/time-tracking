apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-service
  labels:
    app: {{ .Release.Name }}-auth-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-auth-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-auth-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Release.Name }}-auth-service"
        vault.hashicorp.com/tls-skip-verify: "false"
        vault.hashicorp.com/ca-cert: "/etc/ssl/cluster-ca/ca.crt"
        vault.hashicorp.com/agent-inject-token: "true"
        vault.hashicorp.com/agent-pre-populate-only: "false"
    spec:
      serviceAccountName: {{ .Release.Name }}-auth-service
      initContainers:
        - name: build-truststore
          image: eclipse-temurin:21-jre
          command:
            - sh
            - -c
            - |
              keytool -import -trustcacerts -noprompt \
                -alias cluster-ca \
                -file /etc/ssl/cluster-ca/ca.crt \
                -keystore /etc/ssl/truststore/truststore.jks \
                -storepass changeit
          volumeMounts:
            - name: cluster-ca
              mountPath: /etc/ssl/cluster-ca
              readOnly: true
            - name: truststore
              mountPath: /etc/ssl/truststore
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.config.mongoHost }} {{ .Values.config.mongoPort }}; do
                echo "Waiting for MongoDB..."; sleep 3;
              done
        - name: wait-for-vault
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-vault 8200; do
                echo "Waiting for Vault..."; sleep 3;
              done
      containers:
        - name: auth-service
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djavax.net.ssl.trustStore=/etc/ssl/truststore/truststore.jks
                -Djavax.net.ssl.trustStorePassword=changeit
            - name: SERVER_SSL_CERTIFICATE
              value: /etc/ssl/service-tls/tls.crt
            - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
              value: /etc/ssl/service-tls/tls.key
            - name: SERVER_PORT
              value: {{ .Values.containerPort | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-auth-service-config
            - secretRef:
                name: {{ .Release.Name }}-auth-service-secret
          volumeMounts:
            - name: truststore
              mountPath: /etc/ssl/truststore
              readOnly: true
            - name: service-tls
              mountPath: /etc/ssl/service-tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.containerPort }}
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.containerPort }}
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: cluster-ca
          secret:
            secretName: {{ .Release.Name }}-ca-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: truststore
          emptyDir: { }
        - name: service-tls
          secret:
            secretName: {{ .Release.Name }}-auth-service-tls
