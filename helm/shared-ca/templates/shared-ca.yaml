apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.ca.bootstrapIssuerName }}
  namespace: cert-manager
spec:
  selfSigned: { }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ca.certificateName }}
  namespace: cert-manager
spec:
  isCA: true
  commonName: {{ .Values.ca.commonName }}
  secretName: {{ .Values.ca.secretName }}
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.ca.bootstrapIssuerName }}
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  ca:
    secretName: {{ .Values.ca.secretName }}

