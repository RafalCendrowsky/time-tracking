spring:
  application:
    name: project-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/timetracking}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

oauth2:
  resource-server:
    issuer-uri: ${AUTH_SERVER_ISSUER:http://localhost:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  exposed-headers: ""
  allow-credentials: false
  max-age-seconds: 1800

vault:
  uri: ${VAULT_URI:http://localhost:8200}
  token: ${VAULT_TOKEN}
  kv-mount: ${VAULT_KV_MOUNT:secret}
  secret-path: ${VAULT_SECRET_PATH:project-service}
