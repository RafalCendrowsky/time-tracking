<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a2e;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .status {
            font-size: 4rem;
            font-weight: 800;
            color: #6366f1;
            line-height: 1;
            margin-bottom: .5rem;
        }
        h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
        .message {
            font-size: .9375rem;
            color: #6b7280;
            margin-bottom: 1.75rem;
        }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: .6875rem 1.5rem;
            background: #6366f1; color: #fff;
            border: none; border-radius: 8px;
            font-size: .9375rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
            transition: background .15s;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
<div class="card">
    <div class="status" th:text="${status}">500</div>
    <h1 th:text="${error}">Internal Server Error</h1>
    <p class="message" th:text="${message != null and !#strings.isEmpty(message)} ? ${message} : 'Something went wrong. Please try again.'"></p>
    <a href="/login" class="btn">Back to sign in</a>
</div>
</body>
</html>
