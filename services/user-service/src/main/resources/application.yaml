spring:
  application:
    name: user-service
  mongodb:
    username: ${MONGO_USER}
    password: ${MONGO_PASS}
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    database: ${MONGO_DB:time-tracking}
    authentication-database: ${MONGO_AUTH_DB:admin}

oauth2:
  internal:
    issuer: ${AUTH_SERVER_ISSUER:http://localhost:8080}
    client:
      id: ${OAUTH2_CLIENT_ID}
      redirect-uri: ${OAUTH2_REDIRECT_URI}
      post-logout-redirect-uri: ${OAUTH2_POST_LOGOUT_REDIRECT_URI}
    token:
      access-token-ttl: ${ACCESS_TOKEN_TTL:PT1H}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  exposed-headers: ""
  allow-credentials: false
  max-age-seconds: 1800

vault:
  uri: ${VAULT_URI}
  token: ${VAULT_TOKEN}
  kv-mount: ${VAULT_KV_MOUNT:secret}
  secret-path: ${VAULT_SECRET_PATH:user-service}

